<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FactureScan - OCR Factures</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .drop-zone { transition: all 0.3s ease; }
    .drop-zone.dragover { border-color: #6366f1; background: #eef2ff; transform: scale(1.01); }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    .thumb-img { width: 50px; height: 66px; object-fit: cover; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .thumb-img:hover { transform: scale(1.15); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-content { background: white; border-radius: 16px; max-width: 90vw; max-height: 90vh; overflow: auto; padding: 20px; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
    .modal-content img { max-width: 100%; max-height: 70vh; display: block; margin: 0 auto; border-radius: 8px; }
    .modal-close { position: absolute; top: 8px; right: 12px; font-size: 24px; cursor: pointer; color: #666; z-index: 10; background: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .modal-close:hover { color: #000; }
    .editable-cell { cursor: pointer; border-bottom: 1px dashed #c7d2fe; }
    .editable-cell:hover { background: #eef2ff; }
    .edit-input { border: 2px solid #6366f1; border-radius: 4px; padding: 2px 6px; font-size: 13px; width: 100%; outline: none; }
    .paid-check { width: 18px; height: 18px; cursor: pointer; accent-color: #22c55e; }
    .status-paid { color: #16a34a; font-weight: 600; }
    .status-unpaid { color: #dc2626; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app"></div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ===== STATE =====
    const state = {
      files: [],
      view: 'upload',
      processing: false,
      currentFileIndex: -1,
      filterClient: 'all',
      apiKey: localStorage.getItem('facturescan_apikey') || '',
      apiKeyValid: false
    };

    // ===== CLAUDE API PARSING =====
    async function parseWithClaude(text, filename) {
      const prompt = `Tu es un expert-comptable francais. Analyse ce texte extrait d'une facture ou d'un document comptable et extrais les informations suivantes en JSON strict.

REGLES IMPORTANTES:
- "fournisseur": le nom de l'entreprise qui EMET la facture (en haut de la facture, dans l'en-tete). C'est le vendeur/prestataire. Donne UNIQUEMENT le nom commercial, sans forme juridique (SARL, SAS, etc.), sans adresse, sans numero.
- "client": le nom de l'entreprise DESTINATAIRE de la facture (celui qui doit payer). C'est souvent apres "Client:", "Destinataire:", "Facture a:", "A l'attention de:" etc. Donne UNIQUEMENT le nom commercial.
- "numero_facture": le numero de la facture
- "date_facture": la date de la facture au format JJ/MM/AAAA
- "montant_ht": montant hors taxes (nombre decimal, sans symbole euro)
- "tva": montant de la TVA (nombre decimal)
- "montant_ttc": montant TTC (nombre decimal)
- "siret": numero SIRET du fournisseur (14 chiffres)
- "tva_intracom": numero de TVA intracommunautaire du fournisseur (format FR + 11 chiffres)

Si une information n'est pas trouvee, mets null.
Si le document n'est pas une facture (releve bancaire, avoir, devis...), indique-le dans un champ "type_document".
Reponds UNIQUEMENT avec le JSON, sans commentaire, sans markdown.

Nom du fichier: ${filename}

Texte extrait:
${text.substring(0, 6000)}`;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': state.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.text();
        throw new Error(`API error ${response.status}: ${err}`);
      }

      const data = await response.json();
      const content = data.content[0].text;

      // Parse JSON from response (handle possible markdown wrapping)
      let jsonStr = content;
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      if (jsonMatch) jsonStr = jsonMatch[0];

      const parsed = JSON.parse(jsonStr);
      return {
        fournisseur: parsed.fournisseur || 'Non identifie',
        client: parsed.client || 'Non identifie',
        numeroFacture: parsed.numero_facture || '',
        dateFacture: parsed.date_facture || '',
        montantHT: parsed.montant_ht != null ? String(parsed.montant_ht) : '',
        tva: parsed.tva != null ? String(parsed.tva) : '',
        montantTTC: parsed.montant_ttc != null ? String(parsed.montant_ttc) : '',
        siret: parsed.siret || '',
        tvaIntra: parsed.tva_intracom || '',
        typeDocument: parsed.type_document || 'facture',
        paye: false
      };
    }

    // ===== PDF TEXT EXTRACTION =====
    async function extractTextFromPDF(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        // Sort by Y position (top to bottom), then X (left to right)
        const items = content.items.slice().sort((a, b) => {
          const dy = b.transform[5] - a.transform[5];
          if (Math.abs(dy) > 5) return dy;
          return a.transform[4] - b.transform[4];
        });
        let lastY = null;
        for (const item of items) {
          const y = Math.round(item.transform[5]);
          if (lastY !== null && Math.abs(y - lastY) > 5) fullText += '\n';
          else if (lastY !== null) fullText += ' ';
          fullText += item.str;
          lastY = y;
        }
        fullText += '\n\n';
      }

      // If PDF text is too short, it's probably a scanned PDF — use OCR
      if (fullText.replace(/\s/g, '').length < 50) {
        return await ocrFromFile(file);
      }
      return fullText;
    }

    // ===== IMAGE OCR =====
    async function ocrFromFile(file) {
      const worker = await Tesseract.createWorker('fra+eng');
      const result = await worker.recognize(file);
      await worker.terminate();
      return result.data.text;
    }

    // ===== THUMBNAIL GENERATION =====
    async function generateThumbnail(file) {
      if (file.type.startsWith('image/')) {
        return URL.createObjectURL(file);
      }
      if (file.type === 'application/pdf') {
        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const page = await pdf.getPage(1);
          const vp = page.getViewport({ scale: 0.3 });
          const canvas = document.createElement('canvas');
          canvas.width = vp.width;
          canvas.height = vp.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
          return canvas.toDataURL('image/jpeg', 0.6);
        } catch (e) {
          return null;
        }
      }
      return null;
    }

    // ===== FILE PROCESSING =====
    async function processFiles(files) {
      state.processing = true;
      render();

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        state.currentFileIndex = i;
        render();

        try {
          // Extract text
          let text = '';
          if (file.type === 'application/pdf') {
            text = await extractTextFromPDF(file);
          } else if (file.type.startsWith('image/')) {
            text = await ocrFromFile(file);
          } else {
            continue;
          }

          // Generate thumbnail
          const thumbnail = await generateThumbnail(file);

          // Parse with Claude API
          let parsed;
          try {
            parsed = await parseWithClaude(text, file.name);
          } catch (apiErr) {
            console.error('[FactureScan] API error for', file.name, apiErr);
            parsed = {
              fournisseur: 'Erreur API',
              client: 'Erreur API',
              numeroFacture: '',
              dateFacture: '',
              montantHT: '',
              tva: '',
              montantTTC: '',
              siret: '',
              tvaIntra: '',
              typeDocument: 'inconnu',
              paye: false
            };
          }

          state.files.push({
            name: file.name,
            rawText: text,
            thumbnail,
            ...parsed
          });

        } catch (err) {
          console.error('[FactureScan] Error processing', file.name, err);
          state.files.push({
            name: file.name,
            rawText: '',
            thumbnail: null,
            fournisseur: 'Erreur',
            client: 'Erreur',
            numeroFacture: '',
            dateFacture: '',
            montantHT: '',
            tva: '',
            montantTTC: '',
            siret: '',
            tvaIntra: '',
            typeDocument: 'erreur',
            paye: false
          });
        }
      }

      state.processing = false;
      state.currentFileIndex = -1;
      if (state.files.length > 0) state.view = 'results';
      render();
    }

    // ===== FORMATTING =====
    function fmt(val) {
      if (!val || val === 'null' || val === 'undefined') return '\u2013';
      const n = parseFloat(String(val).replace(/\s/g, '').replace(',', '.'));
      if (isNaN(n)) return val;
      return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function parseDate(d) {
      if (!d) return null;
      const parts = d.split('/');
      if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
      return new Date(d);
    }

    // ===== GROUPING & SORTING =====
    function getGroupedData() {
      let filtered = state.files;
      if (state.filterClient !== 'all') {
        filtered = filtered.filter(f => f.client === state.filterClient);
      }

      // Group by client
      const groups = {};
      for (const f of filtered) {
        const client = f.client || 'Non identifie';
        if (!groups[client]) groups[client] = {};
        const fournisseur = f.fournisseur || 'Non identifie';
        if (!groups[client][fournisseur]) groups[client][fournisseur] = [];
        groups[client][fournisseur].push(f);
      }

      // Sort invoices within each supplier group by date
      for (const client of Object.keys(groups)) {
        for (const fourn of Object.keys(groups[client])) {
          groups[client][fourn].sort((a, b) => {
            const da = parseDate(a.dateFacture);
            const db = parseDate(b.dateFacture);
            if (!da && !db) return 0;
            if (!da) return 1;
            if (!db) return -1;
            return da - db;
          });
        }
      }

      return groups;
    }

    // ===== EXCEL EXPORT =====
    function exportExcel() {
      const rows = [];
      const grouped = getGroupedData();

      for (const client of Object.keys(grouped).sort()) {
        for (const fourn of Object.keys(grouped[client]).sort()) {
          for (const f of grouped[client][fourn]) {
            rows.push({
              'Societe (Client)': f.client,
              'Fournisseur': f.fournisseur,
              'SIRET': f.siret,
              'TVA Intracom.': f.tvaIntra,
              'N\u00b0 Facture': f.numeroFacture,
              'Date Facture': f.dateFacture,
              'Montant HT': f.montantHT ? parseFloat(String(f.montantHT).replace(',', '.')) : '',
              'TVA': f.tva ? parseFloat(String(f.tva).replace(',', '.')) : '',
              'Montant TTC': f.montantTTC ? parseFloat(String(f.montantTTC).replace(',', '.')) : '',
              'Paye': f.paye ? 'Oui' : 'Non',
              'Fichier source': f.name
            });
          }
        }
      }

      const ws = XLSX.utils.json_to_sheet(rows);
      // Set column widths
      ws['!cols'] = [
        { wch: 25 }, { wch: 30 }, { wch: 16 }, { wch: 16 },
        { wch: 14 }, { wch: 12 }, { wch: 12 }, { wch: 10 },
        { wch: 12 }, { wch: 8 }, { wch: 25 }
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Factures');
      XLSX.writeFile(wb, `factures_export_${new Date().toISOString().slice(0, 10)}.xlsx`);
    }

    // ===== MODAL =====
    function showModal(f) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

      const content = document.createElement('div');
      content.className = 'modal-content';
      content.style.maxWidth = '700px';

      let imgHtml = '';
      if (f.thumbnail) {
        imgHtml = `<img src="${f.thumbnail}" alt="${f.name}" style="max-height:50vh; margin-bottom: 16px;">`;
      }

      content.innerHTML = `
        <div class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</div>
        <h3 style="font-weight:600; font-size:16px; margin-bottom:12px;">${f.name}</h3>
        ${imgHtml}
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:13px; margin-top:12px;">
          <div><strong>Fournisseur:</strong> ${f.fournisseur}</div>
          <div><strong>Client:</strong> ${f.client}</div>
          <div><strong>N\u00b0 Facture:</strong> ${f.numeroFacture || '\u2013'}</div>
          <div><strong>Date:</strong> ${f.dateFacture || '\u2013'}</div>
          <div><strong>HT:</strong> ${fmt(f.montantHT)}</div>
          <div><strong>TVA:</strong> ${fmt(f.tva)}</div>
          <div><strong>TTC:</strong> ${fmt(f.montantTTC)}</div>
          <div><strong>SIRET:</strong> ${f.siret || '\u2013'}</div>
          <div><strong>TVA Intracom.:</strong> ${f.tvaIntra || '\u2013'}</div>
          <div><strong>Type:</strong> ${f.typeDocument || 'facture'}</div>
          <div><strong>Statut:</strong> ${f.paye ? '<span class="status-paid">Paye</span>' : '<span class="status-unpaid">Non paye</span>'}</div>
        </div>
      `;

      overlay.appendChild(content);
      document.body.appendChild(overlay);
    }

    // ===== RENDER =====
    function render() {
      const app = document.getElementById('app');

      // ---- API KEY SETUP ----
      if (!state.apiKey || !state.apiKeyValid) {
        app.innerHTML = `
          <div class="max-w-lg mx-auto mt-20 p-8">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">FactureScan</h1>
            <p class="text-center text-gray-500 mb-8">Scannez vos factures avec l'IA</p>

            <div class="bg-white rounded-2xl shadow-lg p-6">
              <h2 class="text-lg font-semibold mb-4">Configuration</h2>
              <p class="text-sm text-gray-600 mb-4">
                Entrez votre cle API Claude (Anthropic) pour analyser vos factures.
                La cle reste dans votre navigateur et n'est envoyee qu'a l'API Anthropic.
              </p>
              <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Cle API Claude</label>
                <input type="password" id="apiKeyInput" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500"
                  placeholder="sk-ant-api..." value="${state.apiKey}">
              </div>
              <div id="apiError" class="text-red-500 text-sm mb-3 hidden"></div>
              <button onclick="validateApiKey()" id="validateBtn"
                class="w-full bg-indigo-600 text-white rounded-lg py-2.5 font-medium hover:bg-indigo-700 transition">
                Valider la cle
              </button>
              <p class="text-xs text-gray-400 mt-3 text-center">
                Obtenez votre cle sur <a href="https://console.anthropic.com/settings/keys" target="_blank" class="text-indigo-500 underline">console.anthropic.com</a>
              </p>
            </div>
          </div>
        `;
        return;
      }

      // ---- UPLOAD VIEW ----
      if (state.view === 'upload' && !state.processing) {
        const hasFiles = state.files.length > 0;
        app.innerHTML = `
          <div class="max-w-3xl mx-auto px-4 py-8">
            <div class="text-center mb-6">
              <h1 class="text-3xl font-bold text-gray-800">FactureScan</h1>
              <p class="text-gray-500 mt-1">Deposez vos factures en vrac &mdash; tri automatique par societe, fournisseur et date</p>
            </div>

            <div class="drop-zone bg-white rounded-2xl shadow-lg p-12 text-center cursor-pointer border-2 border-dashed border-gray-200"
              id="dropZone" onclick="document.getElementById('fileInput').click()">
              <div class="text-5xl mb-3">&#128194;</div>
              <p class="font-semibold text-gray-700">Deposez vos factures ici</p>
              <p class="text-sm text-gray-400">PDF, JPG, PNG &mdash; Toutes societes melangees</p>
              <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.tiff,.tif,.bmp,.webp" class="hidden">
            </div>

            ${hasFiles ? `
              <div class="mt-4 text-center">
                <button onclick="state.view='results'; render();" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700">
                  Voir les ${state.files.length} factures analysees
                </button>
              </div>
            ` : ''}

            <div class="mt-6 bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
              <strong>Comment ca marche :</strong> Deposez vos fichiers &rarr; l'OCR extrait le texte &rarr; l'IA Claude analyse chaque facture et identifie automatiquement le fournisseur, votre societe, les montants, etc.
            </div>
          </div>
        `;

        setupDropZone();
        return;
      }

      // ---- PROCESSING VIEW ----
      if (state.processing) {
        const total = state.currentFileIndex >= 0 ? state.files.length + (state.currentFileIndex + 1) : 0;
        app.innerHTML = `
          <div class="max-w-lg mx-auto px-4 py-20 text-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Analyse en cours...</h1>
            <div class="mb-4">
              <div class="w-full bg-gray-200 rounded-full h-3">
                <div class="bg-indigo-600 h-3 rounded-full transition-all" style="width: ${state.currentFileIndex >= 0 ? Math.round(((state.currentFileIndex) / (state.currentFileIndex + 1 + (state.files.length - state.currentFileIndex))) * 100) : 0}%"></div>
              </div>
            </div>
            <p class="text-gray-600">Facture ${state.currentFileIndex + 1} sur ${state.currentFileIndex + 1 + state.files.filter(f => !f.rawText && !f.fournisseur).length || '?'}...</p>
            <p class="text-sm text-gray-400 mt-2">Extraction du texte + analyse par IA Claude</p>
          </div>
        `;
        return;
      }

      // ---- RESULTS VIEW ----
      if (state.view === 'results') {
        renderResults();
      }
    }

    function renderResults() {
      const app = document.getElementById('app');
      const grouped = getGroupedData();

      // Stats
      const clients = [...new Set(state.files.map(f => f.client))];
      const fournisseurs = [...new Set(state.files.map(f => f.fournisseur))];
      const totalTTC = state.files.reduce((sum, f) => {
        const v = parseFloat(String(f.montantTTC || '0').replace(/\s/g, '').replace(',', '.'));
        return sum + (isNaN(v) ? 0 : v);
      }, 0);
      const totalNonPaye = state.files.filter(f => !f.paye).reduce((sum, f) => {
        const v = parseFloat(String(f.montantTTC || '0').replace(/\s/g, '').replace(',', '.'));
        return sum + (isNaN(v) ? 0 : v);
      }, 0);

      // Client filter options
      const clientOptions = clients.sort().map(c =>
        `<option value="${c}" ${state.filterClient === c ? 'selected' : ''}>${c}</option>`
      ).join('');

      let html = `
        <div class="max-w-7xl mx-auto px-4 py-6">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h1 class="text-2xl font-bold text-gray-800">FactureScan</h1>
              <p class="text-sm text-gray-500">${state.files.length} factures analysees</p>
            </div>
            <div class="flex gap-2">
              <button onclick="document.getElementById('addFileInput').click()"
                class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50">
                + Ajouter des factures
              </button>
              <button onclick="exportExcel()"
                class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700">
                &#128202; Exporter Excel
              </button>
              <input type="file" id="addFileInput" multiple accept=".pdf,.jpg,.jpeg,.png" class="hidden">
            </div>
          </div>

          <!-- Stats cards -->
          <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-5">
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
              <p class="text-xs text-gray-500 uppercase tracking-wide">Vos societes</p>
              <p class="text-2xl font-bold text-gray-800">${clients.length}</p>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
              <p class="text-xs text-gray-500 uppercase tracking-wide">Fournisseurs</p>
              <p class="text-2xl font-bold text-gray-800">${fournisseurs.length}</p>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
              <p class="text-xs text-gray-500 uppercase tracking-wide">Factures</p>
              <p class="text-2xl font-bold text-gray-800">${state.files.length}</p>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
              <p class="text-xs text-gray-500 uppercase tracking-wide">Total TTC</p>
              <p class="text-xl font-bold text-indigo-600">${totalTTC.toLocaleString('fr-FR', {minimumFractionDigits: 2})} &euro;</p>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm border border-red-100">
              <p class="text-xs text-gray-500 uppercase tracking-wide">Reste a payer</p>
              <p class="text-xl font-bold text-red-600">${totalNonPaye.toLocaleString('fr-FR', {minimumFractionDigits: 2})} &euro;</p>
            </div>
          </div>

          <!-- Filter -->
          <div class="flex items-center gap-3 mb-4">
            <label class="text-sm text-gray-600">Societe :</label>
            <select onchange="state.filterClient=this.value; render();"
              class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-indigo-500">
              <option value="all" ${state.filterClient === 'all' ? 'selected' : ''}>Toutes</option>
              ${clientOptions}
            </select>
          </div>

          <p class="text-xs text-indigo-400 mb-2">Cliquer sur un fournisseur pour le modifier &bull; Cliquer sur une ligne pour l'apercu</p>

          <!-- Table -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-200 text-left text-xs text-gray-500 uppercase tracking-wide">
                  <th class="px-3 py-3 w-8">&#10004;</th>
                  <th class="px-3 py-3">Apercu</th>
                  <th class="px-3 py-3">Fournisseur</th>
                  <th class="px-3 py-3">N&deg; Facture</th>
                  <th class="px-3 py-3">Date</th>
                  <th class="px-3 py-3">SIRET</th>
                  <th class="px-3 py-3 text-right">HT</th>
                  <th class="px-3 py-3 text-right">TVA</th>
                  <th class="px-3 py-3 text-right">TTC</th>
                  <th class="px-3 py-3 text-center">Paye</th>
                </tr>
              </thead>
              <tbody>`;

      // Render grouped
      for (const client of Object.keys(grouped).sort()) {
        const clientInvoices = [];
        for (const fourn of Object.keys(grouped[client])) {
          clientInvoices.push(...grouped[client][fourn]);
        }
        const clientTotal = clientInvoices.reduce((s, f) => {
          const v = parseFloat(String(f.montantTTC || '0').replace(/\s/g, '').replace(',', '.'));
          return s + (isNaN(v) ? 0 : v);
        }, 0);
        const paidCount = clientInvoices.filter(f => f.paye).length;

        html += `
          <tr class="bg-indigo-50 border-b border-indigo-100">
            <td colspan="10" class="px-3 py-2">
              <div class="flex items-center justify-between">
                <span class="font-semibold text-indigo-800">&#127970; ${client}</span>
                <span class="text-xs text-indigo-500">${clientInvoices.length} factures &mdash; Total: ${clientTotal.toLocaleString('fr-FR', {minimumFractionDigits: 2})} &euro; &mdash; ${paidCount}/${clientInvoices.length} payees</span>
              </div>
            </td>
          </tr>`;

        for (const fourn of Object.keys(grouped[client]).sort()) {
          if (Object.keys(grouped[client]).length > 1) {
            html += `
              <tr class="bg-gray-50 border-b border-gray-100">
                <td colspan="10" class="px-6 py-1.5">
                  <span class="text-xs font-medium text-gray-500">&#128196; ${fourn}</span>
                </td>
              </tr>`;
          }

          for (const f of grouped[client][fourn]) {
            const idx = state.files.indexOf(f);
            const thumbHtml = f.thumbnail
              ? `<img src="${f.thumbnail}" class="thumb-img" onclick="event.stopPropagation(); showModal(state.files[${idx}])">`
              : `<div class="thumb-img bg-gray-100 flex items-center justify-center text-gray-400 text-xs">PDF</div>`;

            html += `
              <tr class="border-b border-gray-50 hover:bg-gray-50 cursor-pointer fade-in" onclick="showModal(state.files[${idx}])">
                <td class="px-3 py-2" onclick="event.stopPropagation()">
                  <input type="checkbox" class="paid-check" ${f.paye ? 'checked' : ''}
                    onchange="state.files[${idx}].paye = this.checked; render();">
                </td>
                <td class="px-3 py-2">${thumbHtml}</td>
                <td class="px-3 py-2 editable-cell font-medium" onclick="event.stopPropagation(); editFournisseur(${idx}, this)">
                  ${f.fournisseur}
                </td>
                <td class="px-3 py-2 text-gray-600">${f.numeroFacture || '\u2013'}</td>
                <td class="px-3 py-2 text-gray-600">${f.dateFacture || '\u2013'}</td>
                <td class="px-3 py-2 text-gray-500 text-xs">${f.siret || '\u2013'}</td>
                <td class="px-3 py-2 text-right font-medium">${fmt(f.montantHT)}</td>
                <td class="px-3 py-2 text-right text-gray-600">${fmt(f.tva)}</td>
                <td class="px-3 py-2 text-right font-bold ${f.paye ? 'text-green-600' : 'text-red-600'}">${fmt(f.montantTTC)}</td>
                <td class="px-3 py-2 text-center">
                  <span class="${f.paye ? 'status-paid' : 'status-unpaid'}">${f.paye ? 'Paye' : 'Non paye'}</span>
                </td>
              </tr>`;
          }
        }
      }

      html += `</tbody></table></div></div>`;
      app.innerHTML = html;

      // Setup add file input
      const addInput = document.getElementById('addFileInput');
      if (addInput) {
        addInput.onchange = (e) => {
          if (e.target.files.length > 0) processFiles(Array.from(e.target.files));
        };
      }
    }

    // ===== EDIT FOURNISSEUR =====
    function editFournisseur(idx, cell) {
      const current = state.files[idx].fournisseur;
      cell.innerHTML = `<input type="text" class="edit-input" value="${current}" onblur="saveFournisseur(${idx}, this)" onkeydown="if(event.key==='Enter')this.blur()">`;
      cell.querySelector('input').focus();
      cell.querySelector('input').select();
    }

    function saveFournisseur(idx, input) {
      const val = input.value.trim();
      if (val) state.files[idx].fournisseur = val;
      render();
    }

    // ===== API KEY VALIDATION =====
    async function validateApiKey() {
      const input = document.getElementById('apiKeyInput');
      const errDiv = document.getElementById('apiError');
      const btn = document.getElementById('validateBtn');
      const key = input.value.trim();

      if (!key) {
        errDiv.textContent = 'Veuillez entrer une cle API.';
        errDiv.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Verification...';
      btn.disabled = true;

      try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 10,
            messages: [{ role: 'user', content: 'test' }]
          })
        });

        if (resp.ok) {
          state.apiKey = key;
          state.apiKeyValid = true;
          localStorage.setItem('facturescan_apikey', key);
          render();
        } else {
          const data = await resp.json();
          errDiv.textContent = `Erreur: ${data.error?.message || resp.status}`;
          errDiv.classList.remove('hidden');
        }
      } catch (e) {
        errDiv.textContent = `Erreur de connexion: ${e.message}`;
        errDiv.classList.remove('hidden');
      }

      btn.textContent = 'Valider la cle';
      btn.disabled = false;
    }

    // ===== DRAG & DROP =====
    function setupDropZone() {
      const dz = document.getElementById('dropZone');
      const fi = document.getElementById('fileInput');
      if (!dz || !fi) return;

      ['dragenter', 'dragover'].forEach(evt => {
        dz.addEventListener(evt, (e) => { e.preventDefault(); dz.classList.add('dragover'); });
      });
      ['dragleave', 'drop'].forEach(evt => {
        dz.addEventListener(evt, (e) => { e.preventDefault(); dz.classList.remove('dragover'); });
      });
      dz.addEventListener('drop', (e) => {
        const files = Array.from(e.dataTransfer.files).filter(f =>
          f.type === 'application/pdf' || f.type.startsWith('image/')
        );
        if (files.length > 0) processFiles(files);
      });
      fi.addEventListener('change', (e) => {
        if (e.target.files.length > 0) processFiles(Array.from(e.target.files));
      });
    }

    // ===== INIT =====
    // Check if API key exists in localStorage
    if (state.apiKey) {
      state.apiKeyValid = true; // Trust stored key, will fail gracefully if invalid
    }
    render();
  </script>
</body>
</html>
