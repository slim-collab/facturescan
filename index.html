<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FactureScan - OCR Factures</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .drop-zone { transition: all 0.3s ease; }
    .drop-zone.dragover { border-color: #6366f1; background: #eef2ff; transform: scale(1.01); }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .progress-ring { transition: stroke-dashoffset 0.3s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    .thumb-img { width: 50px; height: 66px; object-fit: cover; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .thumb-img:hover { transform: scale(1.15); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-content { background: white; border-radius: 16px; max-width: 90vw; max-height: 90vh; overflow: auto; padding: 20px; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
    .modal-content img { max-width: 100%; max-height: 70vh; display: block; margin: 0 auto; border-radius: 8px; }
    .modal-close { position: absolute; top: 8px; right: 12px; font-size: 24px; cursor: pointer; color: #666; z-index: 10; background: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .modal-close:hover { color: #000; }
    .raw-text-box { max-height: 200px; overflow-y: auto; font-size: 11px; line-height: 1.4; white-space: pre-wrap; word-break: break-all; }
    .editable-cell { cursor: pointer; border-bottom: 1px dashed #c7d2fe; }
    .editable-cell:hover { background: #eef2ff; }
    .edit-input { border: 2px solid #6366f1; border-radius: 4px; padding: 2px 6px; font-size: 13px; width: 100%; outline: none; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app"></div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ===== STATE =====
    const state = {
      files: [],
      view: 'upload',
      processing: false,
      currentFileIndex: -1,
      sortBy: 'client',
      filterClient: 'all',
      filterSociete: 'all'
    };

    // ===== INVOICE PARSING (V5 - complete rewrite) =====
    function parseInvoiceText(text, filename) {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const fullText = text;

      // ========== UTILITY ==========
      function isValidInvoiceNumber(val) {
        if (!val || val.length < 2) return false;
        const badWords = /^(date|ation|uration|ture|ment|teur|pour|avec|dans|cette|votre|notre|avoir|total|montant|objet|paiement|reglement|euros?|prix|remise|solde|acompte|relev[e\u00e9]|r[e\u00e9]capitulatif|description|d[e\u00e9]signation|quantit[e\u00e9]|unit[e\u00e9]|libell[e\u00e9]|client|compte|adresse|code|type|mode|conditions?)$/i;
        if (badWords.test(val)) return false;
        if (!/\d/.test(val)) return false;
        return true;
      }

      // ========== SIRET ==========
      let siret = '';
      const siretPatterns = [
        /SIRET\s*[:\-]?\s*(\d[\d\s]{12,16}\d)/i,
        /SIRET\s*[:\-]?\s*(\d{14})/i,
        /SIRET\s*[:\-]?\s*(\d{3}\s?\d{3}\s?\d{3}\s?\d{5})/i,
      ];
      for (const p of siretPatterns) {
        const m = text.match(p);
        if (m) {
          const cleaned = m[1].replace(/\s/g, '');
          if (cleaned.length === 14) { siret = cleaned; break; }
        }
      }
      if (!siret) {
        const bareMatch = text.match(/(\d{3}\s\d{3}\s\d{3}\s\d{5})/);
        if (bareMatch) {
          const idx = text.indexOf(bareMatch[0]);
          const context = text.substring(Math.max(0, idx - 80), idx + bareMatch[0].length + 20).toUpperCase();
          if (context.includes('SIRET') || context.includes('RCS') || context.includes('SIREN')) {
            siret = bareMatch[1].replace(/\s/g, '');
          }
        }
      }

      // ========== TVA Intracommunautaire ==========
      let tvaIntra = '';
      const tvaIntraPatterns = [
        /(?:TVA\s*(?:intra(?:communautaire)?|n[\u00b0o])|N[\u00b0o]\s*(?:de\s*)?TVA|Ident(?:ifiant)?\s*(?:de\s*)?TVA|ID\s*TVA|TVA\s*ID)\s*[:\-]?\s*(FR\s?\d{2}\s?\d{3}\s?\d{3}\s?\d{3})/i,
        /(FR\s?\d{2}\s?\d{3}\s?\d{3}\s?\d{3})/,
      ];
      for (const p of tvaIntraPatterns) {
        const m = text.match(p);
        if (m) { tvaIntra = m[1].replace(/\s/g, ''); break; }
      }

      // ========== V5: FOURNISSEUR (supplier) ==========
      // On French invoices, the supplier name is almost ALWAYS in the first few lines (header/letterhead)
      // Legal mentions ("SARL au capital de...", "RCS...") are at the BOTTOM and should be IGNORED for supplier detection

      let societe = '';

      // Lines that should NEVER be considered as a company name
      function isGarbageLine(line) {
        if (!line || line.length < 3 || line.length > 55) return true;
        // Common document keywords
        if (/^(facture|invoice|devis|avoir|bon\s*de|note\s*de|re[cç]u|bordereau|relev[e\u00e9]|r[e\u00e9]cap)/i.test(line)) return true;
        // Page/date lines
        if (/^(date|page\s*\d|le\s+\d|du\s+\d|en\s+date)/i.test(line)) return true;
        // Pure numbers, amounts, codes
        if (/^\d+[,\.]\d{2}\s*(\u20ac|EUR|euros?)?\s*$/i.test(line)) return true;
        if (/^\+?\d[\d\s\.\-]{7,}$/.test(line)) return true; // phone
        if (/^\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4}/.test(line)) return true; // dates
        // Addresses (start with number + street type)
        if (/^\d+[\s,]+\s*(rue|avenue|av\.|boulevard|blvd|bd|impasse|chemin|place|all[e\u00e9]e|route|passage|cours|voie|quai|square|r[e\u00e9]sidence|lot|zone)/i.test(line)) return true;
        // Postal codes
        if (/^\d{5}\s/.test(line)) return true;
        // Email, URL
        if (/@|www\.|http|\.com\b|\.fr\b/i.test(line)) return true;
        // SIRET/TVA/IBAN lines
        if (/^(siret|siren|tva|iban|bic|rib|code\s*ape|n[\u00b0o]\s*(de\s*)?tva|ape|naf)\s*[:\s]/i.test(line)) return true;
        if (/^[A-Z]{2}\d{2}\s/.test(line)) return true; // IBAN
        // Financial keywords
        if (/^(montant|total|net|solde|reste|sous.total|prix|remise|acompte|r[e\u00e8]glement|paiement|conditions|modalit)/i.test(line)) return true;
        // Legal mention lines (CRITICAL - these appear in footers)
        if (/au\s+capital/i.test(line)) return true; // "SARL au capital de 5000"
        if (/capital\s+social/i.test(line)) return true;
        if (/\bR\.?C\.?S\.?\s/i.test(line)) return true; // "RCS Paris..."
        if (/\bAPE\s*[:\/]\s*\d/i.test(line)) return true;
        // Table headers / description lines
        if (/\(S\)\s*:|\(P\)\s*:/i.test(line)) return true; // "(S) : Service (P) : Produit"
        if (/^(description|d[e\u00e9]signation|libell[e\u00e9]|quantit[e\u00e9]|unit[e\u00e9]|r[e\u00e9]f[e\u00e9]rence|article)/i.test(line)) return true;
        if (/^(objet|r[e\u00e9]f\.|n[\u00b0o]\s)/i.test(line)) return true;
        // Service/Produit column headers
        if (/\bService\b.*\bProduit\b|\bProduit\b.*\bService\b/i.test(line)) return true;
        // Mentions légales keywords
        if (/^mentions?\s*l[e\u00e9]gales/i.test(line)) return true;
        // Lines that are just "euro", "EUR"
        if (/^(euro|EUR|\u20ac)\b/i.test(line)) return true;
        if (/\b(euro|EUR|\u20ac)\b/.test(line) && line.length < 10) return true;
        // "N° client", "Code client", etc
        if (/^(n[\u00b0o]|code|votre|notre)\s*(client|r[e\u00e9]f|commande|compte)/i.test(line)) return true;
        // Coordonnées, telephone
        if (/^(coordonn[e\u00e9]es|t[e\u00e9]l[e\u00e9]?\.?|fax|mobile|portable)\s*[:\s]/i.test(line)) return true;
        // Lines with mostly digits
        const digitCount = (line.match(/\d/g) || []).length;
        const totalCount = line.length;
        if (totalCount > 5 && digitCount / totalCount > 0.6) return true;
        return false;
      }

      // Clean a supplier name candidate
      function cleanSupplierName(name) {
        if (!name) return '';
        // Strip everything after common break words
        name = name.replace(/\s+[Ff]acture\b.*$/i, ''); // "SARL DE CHAMBURE Facture Haras..."
        name = name.replace(/\s+[Ii]nvoice\b.*$/i, '');
        name = name.replace(/\s+[Dd]evis\b.*$/i, '');
        name = name.replace(/\s+[Aa]voir\b.*$/i, '');
        name = name.replace(/\s+au\s+capital\b.*$/i, ''); // "EARL XYZ au capital de..."
        name = name.replace(/\s+capital\s+social\b.*$/i, '');
        name = name.replace(/\s*R\.?C\.?S\.?\s.*$/i, ''); // "... RCS Paris"
        name = name.replace(/\s*SIRET\s.*$/i, '');
        name = name.replace(/\s*SIREN\s.*$/i, '');
        name = name.replace(/\s*APE\s.*$/i, '');
        name = name.replace(/\s*TVA\s.*$/i, '');
        // Strip address fragments
        name = name.replace(/\s*\d{1,4}\s*(rue|avenue|av\.|boulevard|blvd|bd|impasse|chemin|place|all[e\u00e9]e|route)\b.*/i, '');
        name = name.replace(/\s*\b\d{5}\b.*$/, '');
        // Strip email/phone
        name = name.replace(/\s*\S+@\S+.*$/g, '');
        name = name.replace(/\s*\+?\d[\d\s\.\-]{7,}.*$/, '');
        name = name.replace(/\s*[Tt][e\u00e9\u00e8]l\.?\s*[:.]?\s*\+?\d.*$/, '');
        // Strip trailing punctuation/numbers
        name = name.replace(/\s*[,;:\-]+\s*$/, '');
        name = name.replace(/^\s*[\-\u2013\u2014]\s*/, '');
        // Strip "N°" prefixes
        name = name.replace(/^n[\u00b0o]\s*\d+\s*/i, '');
        return name.trim();
      }

      // Validate a cleaned supplier name
      function isValidSupplier(name) {
        if (!name || name.length < 3 || name.length > 55) return false;
        if (isGarbageLine(name)) return false;
        // Must contain at least some letters
        if (!/[a-zA-Z\u00c0-\u00fc]{2}/.test(name)) return false;
        return true;
      }

      // ===== Detect CLIENT (destinataire) FIRST =====
      // This helps us exclude the client name from supplier candidates
      let clientDetected = '';
      const clientNames = new Set();

      for (let li = 0; li < lines.length; li++) {
        const clientLabelMatch = lines[li].match(/^(?:client|destinataire|factur[e\u00e9]\s*[\u00e0a]|adress[e\u00e9]?\s*(?:de\s*)?(?:facturation|livraison)|livr[e\u00e9]\s*[\u00e0a]|acheteur|[\u00e0a]\s*l\x27attention\s*de|att[\.:]\s*|pour\s*(?:le\s*compte\s*(?:de)?)?)\s*[:\-]?\s*(.*)$/i);
        if (clientLabelMatch) {
          const sameLine = (clientLabelMatch[1] || '').trim();
          if (sameLine.length >= 3 && sameLine.length <= 60 && !/@|www\.|http/.test(sameLine)) {
            if (!clientDetected) clientDetected = sameLine;
            clientNames.add(sameLine.toUpperCase());
          }
          // Check next lines for the actual client name
          for (let j = li + 1; j < Math.min(li + 5, lines.length); j++) {
            const cl = lines[j];
            if (!cl || cl.length < 3) continue;
            // Stop at address lines
            if (/^\d{1,4}\s*(rue|avenue|av\.|boulevard|blvd|bd|impasse|chemin|place|all[e\u00e9]e|route)/i.test(cl)) break;
            if (/^\d{5}\s/.test(cl)) break;
            if (/@|www\.|http/.test(cl)) break;
            if (/^(siret|tva|iban|bic)/i.test(cl)) break;
            if (cl.length <= 60) {
              if (!clientDetected) clientDetected = cl;
              clientNames.add(cl.toUpperCase());
            }
          }
          break; // Only use first client block
        }
      }

      // ===== SUPPLIER DETECTION (V5 - top-down approach) =====
      // On French invoices, the supplier name is typically the FIRST prominent text (top of page, letterhead)

      const headerLines = lines.slice(0, 15); // Only look in top portion

      // Strategy 1: Explicit "Fournisseur:", "Emetteur:", "Raison sociale:" labels
      const explicitLabels = [
        /(?:Raison\s*sociale|Soci[e\u00e9]t[e\u00e9]|Fournisseur|[\u00c9E]metteur|Vendeur|Prestataire|De\s*:)\s*[:\-]\s*(.{3,60})/i,
      ];
      for (const p of explicitLabels) {
        const m = headerLines.join('\n').match(p);
        if (m) {
          let val = cleanSupplierName(m[1].split('\n')[0]);
          if (isValidSupplier(val) && !clientNames.has(val.toUpperCase())) {
            societe = val;
            break;
          }
        }
      }

      // Strategy 2: First good line in the header (most reliable for French invoices)
      // The very first non-garbage line is almost always the company name/letterhead
      if (!societe) {
        for (let i = 0; i < headerLines.length; i++) {
          const line = headerLines[i];
          // Skip lines that are clearly garbage
          if (isGarbageLine(line)) continue;
          // Skip if this is a client name
          if (clientNames.has(line.toUpperCase())) continue;
          // Skip lines that are part of a "Client:" block
          let isInClientBlock = false;
          for (let j = Math.max(0, i - 1); j <= Math.min(i + 1, headerLines.length - 1); j++) {
            if (/^(client|destinataire|factur[e\u00e9]\s*[\u00e0a]|livr[e\u00e9]\s*[\u00e0a]|acheteur)/i.test(headerLines[j])) {
              isInClientBlock = true;
              break;
            }
          }
          if (isInClientBlock) continue;

          let candidate = cleanSupplierName(line);
          if (isValidSupplier(candidate)) {
            societe = candidate;
            break;
          }
        }
      }

      // Strategy 3: Legal form in header (SARL, SAS, etc.) - ONLY in header lines
      if (!societe) {
        const legalForms = 'SARL|SAS|SASU|SA|EURL|EARL|SCI|SELARL|SELAS|SCOP|GIE|SNC|SEP';
        const headerText = headerLines.join('\n');
        const legalPatterns = [
          // "SARL DE CHAMBURE" - legal form at start
          new RegExp('\\b(' + legalForms + ')\\s+([A-Z\u00c0-\u00dc][A-Z\u00c0-\u00dca-z\u00e0-\u00fc0-9\\s&\\x27\\-\\.]{1,40})\\b'),
          // "Menuiserie DUPONT SAS" - legal form at end
          new RegExp('\\b([A-Z\u00c0-\u00dc][A-Z\u00c0-\u00dca-z\u00e0-\u00fc0-9\\s&\\x27\\-\\.]{1,40})\\s+(' + legalForms + ')\\b'),
        ];
        for (const p of legalPatterns) {
          const m = headerText.match(p);
          if (m) {
            let val = cleanSupplierName(m[0]);
            if (isValidSupplier(val) && !clientNames.has(val.toUpperCase())) {
              societe = val;
              break;
            }
          }
        }
      }

      // Strategy 4: Legal form anywhere in text (fallback) - with aggressive cleanup
      if (!societe) {
        const legalForms = 'SARL|SAS|SASU|SA|EURL|EARL|SCI|SELARL|SELAS|SCOP|GIE|SNC|SEP';
        // Find lines containing a legal form
        for (const line of lines) {
          const legalMatch = line.match(new RegExp('\\b(' + legalForms + ')\\s+([A-Z\u00c0-\u00dc][^\\n]{1,40})', 'i'));
          if (legalMatch) {
            let val = cleanSupplierName(legalMatch[0]);
            // Skip if it's in a "au capital" context
            if (/au\s+capital/i.test(line)) continue;
            if (isValidSupplier(val) && !clientNames.has(val.toUpperCase())) {
              societe = val;
              break;
            }
          }
          // Also try: name + legal form
          const legalMatch2 = line.match(new RegExp('([A-Z\u00c0-\u00dc][^\\n]{1,40})\\s+(' + legalForms + ')\\b', 'i'));
          if (legalMatch2) {
            let val = cleanSupplierName(legalMatch2[0]);
            if (/au\s+capital/i.test(line)) continue;
            if (isValidSupplier(val) && !clientNames.has(val.toUpperCase())) {
              societe = val;
              break;
            }
          }
        }
      }

      // Strategy 5: Line before an address in the header
      if (!societe) {
        for (let i = 0; i < headerLines.length; i++) {
          if (/^\d{1,4}\s*(rue|avenue|av\.|boulevard|blvd|bd|impasse|chemin|place|all[e\u00e9]e|route|passage|cours|voie|quai)/i.test(headerLines[i]) ||
              /^\d{5}\s+[A-Z\u00c0-\u00dc]/.test(headerLines[i])) {
            for (let j = i - 1; j >= Math.max(0, i - 3); j--) {
              let candidate = cleanSupplierName(headerLines[j]);
              if (isValidSupplier(candidate) && !clientNames.has(candidate.toUpperCase())) {
                societe = candidate;
                break;
              }
            }
            if (societe) break;
          }
        }
      }

      // Strategy 6: Line near SIRET/RCS mentions
      if (!societe) {
        for (let i = 0; i < lines.length; i++) {
          if (/\b(SIRET|SIREN|R\.?C\.?S\.?)\b/i.test(lines[i])) {
            for (let j = i - 1; j >= Math.max(0, i - 5); j--) {
              let candidate = cleanSupplierName(lines[j]);
              if (isValidSupplier(candidate) && !clientNames.has(candidate.toUpperCase())) {
                societe = candidate;
                break;
              }
            }
            if (societe) break;
          }
        }
      }

      // Final cleanup
      if (societe) {
        if (societe.length > 50) societe = societe.substring(0, 50);
      }
      if (!societe || societe.length < 3) societe = 'Non identifie';

      console.log('[FactureScan V5] File:', filename, '| Fournisseur:', societe, '| Client:', clientDetected, '| Lines[0..7]:', lines.slice(0, 8));

      // ========== NUMERO DE FACTURE ==========
      let numero = '';
      const numPatterns = [
        /\bfacture\b\s*(?:n[\u00b0o]?\s*)?[:\-#]?\s*([A-Z0-9][\w\-\/]{2,20})/i,
        /\b(?:n[\u00b0o]|num[e\u00e9]ro)\s*(?:de\s*)?(?:facture|fact\.?)?\s*[:\-#]?\s*([A-Z0-9][\w\-\/]{2,20})/i,
        /\binvoice\b\s*(?:n[\u00b0o]?\s*)?[:\-#]?\s*([A-Z0-9][\w\-\/]{2,20})/i,
        /\b(?:ref|r[e\u00e9]f[e\u00e9]rence)\s*[:\-#]?\s*([A-Z0-9][\w\-\/]{2,20})/i,
        /\b(F[A-Z]?[\-\/]\d{4,}[\w\-]*)\b/,
        /\b(FA\d{4,})\b/,
        /\b(FACT[\-\/]?\d{3,})\b/i,
      ];
      for (const p of numPatterns) {
        const m = text.match(p);
        if (m && m[1]) {
          const val = m[1].trim();
          if (isValidInvoiceNumber(val)) { numero = val; break; }
        }
      }

      // ========== DATE FACTURE ==========
      let dateFacture = '';
      const moisFR = 'janvier|f[e\u00e9]vrier|mars|avril|mai|juin|juillet|ao[\u00fbu]t|septembre|octobre|novembre|d[e\u00e9]cembre';
      const datePatterns = [
        new RegExp('(?:date\\s*(?:de\\s*)?(?:facture|facturation|[e\u00e9]mission)?)\\s*[:\\-]?\\s*(\\d{1,2}[\\s\\/\\.\\-]\\d{1,2}[\\s\\/\\.\\-]\\d{2,4})', 'i'),
        new RegExp('(?:le|du|en\\s*date\\s*du|fait\\s*le|[e\u00e9]mise?\\s*le)\\s+(\\d{1,2}[\\s\\/\\.\\-]\\d{1,2}[\\s\\/\\.\\-]\\d{2,4})', 'i'),
        new RegExp('(?:date\\s*[:\\-]?\\s*)(\\d{1,2}\\s+(?:' + moisFR + ')\\s+\\d{4})', 'i'),
        /(\d{1,2}[\s\/\.\-]\d{1,2}[\s\/\.\-]\d{4})/,
        new RegExp('(\\d{1,2}\\s+(?:' + moisFR + ')\\s+\\d{4})', 'i'),
      ];
      for (const p of datePatterns) {
        const m = text.match(p);
        if (m) { dateFacture = m[1]?.trim(); break; }
      }

      // ========== MONTANTS ==========
      let montantTTC = '', montantHT = '', tva = '';
      function extractAmount(match) { return match ? match.trim().replace(/\s/g, '') : ''; }
      const amtFrag = '([\\d\\s]+[,\\.]\\d{2})';

      const ttcPatterns = [
        new RegExp('(?:total\\s*(?:ttc|toutes\\s*taxes)|net\\s*[\u00e0a]\\s*payer|montant\\s*(?:total\\s*)?ttc|solde\\s*[\u00e0a]\\s*payer)\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:\u20ac|EUR)?', 'i'),
        new RegExp('(?:net\\s*[\u00e0a]\\s*payer|total\\s*d[u\u00fb]|reste\\s*[\u00e0a]\\s*payer)\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:\u20ac|EUR)?', 'i'),
        new RegExp('\\bTTC\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:\u20ac|EUR)?', 'i'),
        new RegExp(amtFrag + '\\s*(?:\u20ac|EUR)\\s*TTC', 'i'),
        new RegExp('\\btotal\\b\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:\u20ac|EUR)', 'i'),
      ];
      for (const p of ttcPatterns) { const m = text.match(p); if (m) { montantTTC = extractAmount(m[1]); break; } }

      const htPatterns = [
        new RegExp('(?:total\\s*(?:ht|hors\\s*taxes?)|montant\\s*(?:total\\s*)?ht|base\\s*ht)\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:\u20ac|EUR)?', 'i'),
        new RegExp('\\bHT\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:\u20ac|EUR)?', 'i'),
        new RegExp(amtFrag + '\\s*(?:\u20ac|EUR)\\s*HT', 'i'),
      ];
      for (const p of htPatterns) { const m = text.match(p); if (m) { montantHT = extractAmount(m[1]); break; } }

      const tvaPatterns = [
        new RegExp('(?:montant\\s*(?:de\\s*la\\s*)?tva|total\\s*tva)\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:\u20ac|EUR)?', 'i'),
        new RegExp('\\b(?:tva|t\\.v\\.a\\.?)\\s*(?:\\d{1,2}[,\\.]?\\d{0,2}\\s*%)?\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:\u20ac|EUR)?', 'i'),
      ];
      for (const p of tvaPatterns) {
        const m = text.match(p);
        if (m) {
          const val = extractAmount(m[1]);
          if (val && !/^FR/i.test(val) && val.length <= 12) { tva = val; break; }
        }
      }

      // Compute missing
      if (!montantTTC && montantHT && tva) {
        const h = parseFloat(montantHT.replace(',', '.')), t = parseFloat(tva.replace(',', '.'));
        if (!isNaN(h) && !isNaN(t)) montantTTC = (h + t).toFixed(2).replace('.', ',');
      }
      if (!montantHT && montantTTC && tva) {
        const t = parseFloat(montantTTC.replace(',', '.')), tv = parseFloat(tva.replace(',', '.'));
        if (!isNaN(t) && !isNaN(tv)) montantHT = (t - tv).toFixed(2).replace('.', ',');
      }
      if (!tva && montantTTC && montantHT) {
        const t = parseFloat(montantTTC.replace(',', '.')), h = parseFloat(montantHT.replace(',', '.'));
        if (!isNaN(t) && !isNaN(h) && t > h) tva = (t - h).toFixed(2).replace('.', ',');
      }

      // Last resort TTC
      if (!montantTTC) {
        const amounts = [];
        const amtRegex = /([\d\s]{1,10}[,\.]\d{2})\s*(?:\u20ac|EUR)?/g;
        let match;
        while ((match = amtRegex.exec(text)) !== null) {
          const val = parseFloat(match[1].replace(/\s/g, '').replace(',', '.'));
          if (!isNaN(val) && val > 0 && val < 1000000) amounts.push(val);
        }
        if (amounts.length > 0) montantTTC = Math.max(...amounts).toFixed(2).replace('.', ',');
      }

      function formatAmount(val) {
        if (!val || val === '-') return '-';
        const num = parseFloat(val.replace(',', '.'));
        if (isNaN(num)) return val;
        return num.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      return {
        societe: societe || 'Non identifie',
        client: clientDetected || 'Non identifie',
        numero: numero || '-',
        dateFacture: dateFacture || '-',
        montantHT: formatAmount(montantHT) || '-',
        montantTTC: formatAmount(montantTTC) || '-',
        tva: formatAmount(tva) || '-',
        siret: siret || '-',
        tvaIntra: tvaIntra || '-',
        fichier: filename
      };
    }

    // ===== PDF TEXT EXTRACTION =====
    async function extractTextFromPDF(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const items = content.items;
        if (items.length === 0) continue;
        const sorted = items.slice().sort((a, b) => {
          const yDiff = b.transform[5] - a.transform[5];
          if (Math.abs(yDiff) > 3) return yDiff;
          return a.transform[4] - b.transform[4];
        });
        let lastY = null, lineText = '';
        for (const item of sorted) {
          const y = Math.round(item.transform[5]);
          if (lastY !== null && Math.abs(y - lastY) > 3) { fullText += lineText.trim() + '\n'; lineText = ''; }
          if (lineText && !lineText.endsWith(' ')) lineText += ' ';
          lineText += item.str;
          lastY = y;
        }
        if (lineText.trim()) fullText += lineText.trim() + '\n';
        fullText += '\n';
      }
      return fullText;
    }

    // ===== IMAGE OCR =====
    async function extractTextFromImage(file, onProgress) {
      const result = await Tesseract.recognize(file, 'fra+eng', {
        logger: m => { if (m.status === 'recognizing text' && onProgress) onProgress(m.progress); }
      });
      return result.data.text;
    }

    // ===== THUMBNAILS =====
    async function generateThumbnail(file) {
      if (file.type === 'application/pdf') {
        try {
          const ab = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
          const page = await pdf.getPage(1);
          const vp = page.getViewport({ scale: 0.4 });
          const c = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
          await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
          return c.toDataURL('image/jpeg', 0.7);
        } catch(e) { return null; }
      } else {
        return new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.onerror = () => r(null); fr.readAsDataURL(file); });
      }
    }

    async function generateFullPreview(file) {
      if (file.type === 'application/pdf') {
        try {
          const ab = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
          const page = await pdf.getPage(1);
          const vp = page.getViewport({ scale: 1.5 });
          const c = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
          await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
          return c.toDataURL('image/jpeg', 0.9);
        } catch(e) { return null; }
      } else {
        return new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.onerror = () => r(null); fr.readAsDataURL(file); });
      }
    }

    // ===== EDIT FOURNISSEUR =====
    window.editFournisseur = function(fileIdx) {
      const f = state.files[fileIdx];
      if (!f || !f.invoiceData) return;
      const cell = document.getElementById('fournisseur-' + fileIdx);
      if (!cell) return;
      const current = f.invoiceData.societe;
      cell.innerHTML = `<input class="edit-input" value="${current.replace(/"/g, '&quot;')}" id="edit-input-${fileIdx}" onblur="saveFournisseur(${fileIdx})" onkeydown="if(event.key==='Enter')this.blur()">`;
      document.getElementById('edit-input-' + fileIdx).focus();
    };
    window.saveFournisseur = function(fileIdx) {
      const f = state.files[fileIdx];
      const input = document.getElementById('edit-input-' + fileIdx);
      if (!f || !input) return;
      const newVal = input.value.trim();
      if (newVal.length >= 1) f.invoiceData.societe = newVal;
      render();
    };

    // ===== PROCESS FILES =====
    async function processFiles() {
      state.processing = true;
      render();
      for (let i = 0; i < state.files.length; i++) {
        const f = state.files[i];
        if (f.status === 'done') continue;
        state.currentFileIndex = i;
        f.status = 'processing'; f.progress = 0; render();
        try {
          let text = '';
          if (f.type === 'application/pdf') {
            f.progress = 5; render();
            f.thumbnail = await generateThumbnail(f.file);
            f.progress = 10; render();
            text = await extractTextFromPDF(f.file);
            f.progress = 70; render();
            if (text.replace(/\s/g, '').length < 50) {
              f.progress = 75; render();
              try {
                const ab = await f.file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
                const page = await pdf.getPage(1);
                const vp = page.getViewport({ scale: 2.0 });
                const c = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
                await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
                const blob = await new Promise(r => c.toBlob(r, 'image/png'));
                text = await extractTextFromImage(blob, (p) => { f.progress = 75 + Math.round(p * 20); render(); });
              } catch(e) { console.warn('OCR fallback failed', f.name, e); }
            }
            f.progress = 95; render();
          } else {
            f.thumbnail = await generateThumbnail(f.file);
            text = await extractTextFromImage(f.file, (p) => { f.progress = Math.round(p * 90); render(); });
          }
          f.extractedText = text;
          f.invoiceData = parseInvoiceText(text, f.name);
          f.status = 'done'; f.progress = 100;
        } catch (err) {
          console.error('Error processing', f.name, err);
          f.status = 'error'; f.errorMessage = err.message;
        }
        render();
      }
      state.processing = false;
      state.view = 'results';
      render();
    }

    // ===== EXPORT EXCEL =====
    function exportToExcel() {
      const invoices = state.files.filter(f => f.status === 'done' && f.invoiceData).map(f => f.invoiceData);
      invoices.sort((a, b) => {
        const c = a.client.localeCompare(b.client, 'fr');
        if (c !== 0) return c;
        const s = a.societe.localeCompare(b.societe, 'fr');
        if (s !== 0) return s;
        return (a.dateFacture || '').localeCompare(b.dateFacture || '');
      });
      const wsData = [['Societe (client)', 'Fournisseur', 'SIRET', 'TVA Intracom.', 'N\u00b0 Facture', 'Date Facture', 'Montant HT', 'TVA', 'Montant TTC', 'Fichier source']];
      let currentClient = '';
      for (const inv of invoices) {
        if (inv.client !== currentClient) { if (currentClient) wsData.push([]); currentClient = inv.client; }
        wsData.push([inv.client, inv.societe, inv.siret, inv.tvaIntra, inv.numero, inv.dateFacture, inv.montantHT, inv.tva, inv.montantTTC, inv.fichier]);
      }
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols'] = [{wch:25},{wch:30},{wch:18},{wch:18},{wch:18},{wch:14},{wch:14},{wch:12},{wch:14},{wch:35}];
      XLSX.utils.book_append_sheet(wb, ws, 'Factures');
      XLSX.writeFile(wb, `factures_scan_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

      if (state.view === 'upload') { app.innerHTML = renderUploadView(); }
      else { app.innerHTML = renderResultsView(); }
      attachEvents();
    }

        const sizeKB = (f.size / 1024).toFixed(0);
        return `
          <div class="flex items-center justify-between py-2 px-3 bg-gray-50 rounded-lg fade-in">
            <div class="flex items-center gap-3 flex-1 min-w-0">

            <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.webp,.tiff,.bmp" class="hidden">
          </div>

          ${totalFiles > 0 ? `
            <div class="mt-6 bg-white rounded-xl border border-gray-200 p-4">
              <div class="flex items-center justify-between mb-3">
                <h3 class="font-semibold text-gray-700">${totalFiles} fichier${totalFiles > 1 ? 's' : ''} ${state.processing ? `(${doneFiles}/${totalFiles} traites)` : 'prets'}</h3>
                <div class="flex gap-2">
                  ${!state.processing ? `<button id="clearBtn" class="text-sm text-gray-400 hover:text-red-500">Tout effacer</button>` : ''}
                </div>
              </div>
              <div class="space-y-2 max-h-64 overflow-y-auto">${filesList}</div>
              ${processingFile ? `<div class="mt-3 p-3 bg-indigo-50 rounded-lg"><p class="text-sm text-indigo-700 font-medium">Analyse en cours : ${processingFile.name}</p></div>` : ''}
              ${!state.processing ? `
                <button id="startBtn" class="mt-4 w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-colors text-lg">
                  \ud83d\udd0d Scanner ${totalFiles} facture${totalFiles > 1 ? 's' : ''}

              ` : `

    function renderResultsView() {
      const fileMap = {};
      state.files.forEach((f, idx) => { fileMap[f.name] = idx; });

      const invoices = state.files
        .filter(f => f.status === 'done' && f.invoiceData)
        .map(f => ({ ...f.invoiceData, _thumbnail: f.thumbnail, _fileIdx: fileMap[f.name] }));

      // Get unique clients and fournisseurs
      const clients = [...new Set(invoices.map(i => i.client))].sort((a, b) => a.localeCompare(b, 'fr'));
      const societes = [...new Set(invoices.map(i => i.societe))].sort((a, b) => a.localeCompare(b, 'fr'));

      let filtered = invoices;
      if (state.filterClient !== 'all') filtered = filtered.filter(i => i.client === state.filterClient);
      if (state.filterSociete !== 'all') filtered = filtered.filter(i => i.societe === state.filterSociete);

      filtered.sort((a, b) => {
        if (state.sortBy === 'client') {
          const c = a.client.localeCompare(b.client, 'fr');
          if (c !== 0) return c;
          const s = a.societe.localeCompare(b.societe, 'fr');
          if (s !== 0) return s;
          return (a.dateFacture || '').localeCompare(b.dateFacture || '');
        }
        if (state.sortBy === 'societe') return a.societe.localeCompare(b.societe, 'fr');
        if (state.sortBy === 'montant') {
          const aV = parseFloat((a.montantTTC || '0').replace(/\s/g, '').replace(',', '.'));
          const bV = parseFloat((b.montantTTC || '0').replace(/\s/g, '').replace(',', '.'));
          return bV - aV;
        }
        if (state.sortBy === 'date') return (a.dateFacture || '').localeCompare(b.dateFacture || '');
        return 0;
      });

      // Group by client
      const grouped = {};

            <div>
              <h1 class="text-2xl font-bold text-gray-900">FactureScan</h1>
              <p class="text-gray-500 text-sm">${filtered.length} facture${filtered.length > 1 ? 's' : ''} analysee${filtered.length > 1 ? 's' : ''}${errorCount > 0 ? ` \u2014 ${errorCount} erreur${errorCount > 1 ? 's' : ''}` : ''}</p>
            </div>
            <div class="flex gap-3">
              <button id="backBtn" class="px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 transition-colors">+ Ajouter des factures</button>
              <button id="exportBtn" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-medium transition-colors">\ud83d\udce5 Exporter Excel</button>
            </div>
          </div>

          <!-- Stats -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl border border-gray-200 p-4">
              <p class="text-xs text-gray-400 uppercase tracking-wide">Vos societes</p>
              <p class="text-2xl font-bold text-gray-900">${clients.length}</p>
            </div>
            <div class="bg-white rounded-xl border border-gray-200 p-4">
              <p class="text-xs text-gray-400 uppercase tracking-wide">Fournisseurs</p>
              <p class="text-2xl font-bold text-gray-900">${societes.length}</p>
            </div>
            <div class="bg-white rounded-xl border border-gray-200 p-4">
              <p class="text-xs text-gray-400 uppercase tracking-wide">Factures</p>
              <p class="text-2xl font-bold text-gray-900">${filtered.length}</p>
            </div>
            <div class="bg-white rounded-xl border border-gray-200 p-4">
              <p class="text-xs text-gray-400 uppercase tracking-wide">Total a payer</p>
              <p class="text-2xl font-bold text-red-600">${grandTotal.toLocaleString('fr-FR', {minimumFractionDigits: 2})} \u20ac</p>
            </div>
          </div>

          <!-- Filters -->
          <div class="flex flex-wrap gap-2 mb-4">
            <span class="text-xs text-gray-500 self-center mr-1">Societe:</span>
            ${clients.map(c => `<button data-filter-client="${c}" class="text-xs px-3 py-1 rounded-full ${state.filterClient === c ? 'bg-indigo-600 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:border-indigo-300'}">${c}</button>`).join('')}
            ${state.filterClient !== 'all' ? `<button id="clearClientFilter" class="text-xs text-indigo-600 hover:text-indigo-800 ml-1">\u2715 Toutes</button>` : ''}
          </div>

          <p class="text-xs text-gray-400 mb-2">Cliquer sur un fournisseur pour le modifier \u2022 Cliquer sur une ligne pour l'apercu</p>

          <!-- Table -->
          <div class="bg-white rounded-xl border border-gray-200 overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="bg-gray-50 border-b border-gray-200">
                  <th class="py-3 px-2 text-left text-xs font-semibold text-gray-500 uppercase w-[60px]">Apercu</th>
                  <th class="py-3 px-2 text-left text-xs font-semibold text-gray-500 uppercase cursor-pointer hover:text-indigo-600" data-sort="societe">Fournisseur</th>
                  <th class="py-3 px-2 text-left text-xs font-semibold text-gray-500 uppercase">N\u00b0 Facture</th>
                  <th class="py-3 px-2 text-left text-xs font-semibold text-gray-500 uppercase cursor-pointer hover:text-indigo-600" data-sort="date">Date</th>
                  <th class="py-3 px-2 text-left text-xs font-semibold text-gray-500 uppercase">SIRET</th>
                  <th class="py-3 px-2 text-right text-xs font-semibold text-gray-500 uppercase">HT</th>
                  <th class="py-3 px-2 text-right text-xs font-semibold text-gray-500 uppercase">TVA</th>
                  <th class="py-3 px-2 text-right text-xs font-semibold text-gray-500 uppercase cursor-pointer hover:text-indigo-600" data-sort="montant">TTC</th>
                </tr>
              </thead>
              <tbody>
                ${tableRows || '<tr><td colspan="8" class="py-8 text-center text-gray-400">Aucune facture trouvee</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    // ===== EVENTS =====
    function attachEvents() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const startBtn = document.getElementById('startBtn');
      const clearBtn = document.getElementById('clearBtn');
      const exportBtn = document.getElementById('exportBtn');
      const backBtn = document.getElementById('backBtn');
      const clearClientFilter = document.getElementById('clearClientFilter');

      if (dropZone) {
        dropZone.addEventListener('click', () => fileInput?.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
      }
      if (fileInput) fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
      if (startBtn) startBtn.addEventListener('click', processFiles);
      if (clearBtn) clearBtn.addEventListener('click', () => { state.files = []; render(); });
      if (exportBtn) exportBtn.addEventListener('click', exportToExcel);
      if (backBtn) backBtn.addEventListener('click', () => { state.view = 'upload'; render(); });
      if (clearClientFilter) clearClientFilter.addEventListener('click', () => { state.filterClient = 'all'; render(); });

      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', (e) => { state.files.splice(parseInt(e.target.dataset.remove), 1); render(); });
      });
      document.querySelectorAll('[data-filter-client]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const c = e.currentTarget.dataset.filterClient;
          state.filterClient = state.filterClient === c ? 'all' : c;
          render();
        });
      });
      document.querySelectorAll('[data-sort]').forEach(th => {
        th.addEventListener('click', (e) => { state.sortBy = e.target.dataset.sort; render(); });
      });
    }

    function handleFiles(fileList) {
      const accepted = ['application/pdf', 'image/jpeg', 'image/png', 'image/webp', 'image/tiff', 'image/bmp'];
      for (const file of fileList) {
        if (!accepted.includes(file.type)) continue;
        if (state.files.some(f => f.name === file.name && f.size === file.size)) continue;
        state.files.push({
          id: Math.random().toString(36).substr(2, 9),
          name: file.name, size: file.size, type: file.type,
          status: 'pending', progress: 0, extractedText: '',
          invoiceData: null, file: file, thumbnail: null, fullPreview: null
        });
      }
      render();
    }

    // ===== INIT =====
    render();
  </script>
</body>
</html>
