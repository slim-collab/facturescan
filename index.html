<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FactureScan - OCR Factures</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .drop-zone { transition: all 0.3s ease; }
    .drop-zone.dragover { border-color: #6366f1; background: #eef2ff; transform: scale(1.01); }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .progress-ring { transition: stroke-dashoffset 0.3s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    .thumb-img { width: 50px; height: 66px; object-fit: cover; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .thumb-img:hover { transform: scale(1.15); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-content { background: white; border-radius: 16px; max-width: 90vw; max-height: 90vh; overflow: auto; padding: 20px; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
    .modal-content img { max-width: 100%; max-height: 70vh; display: block; margin: 0 auto; border-radius: 8px; }
    .modal-close { position: absolute; top: 8px; right: 12px; font-size: 24px; cursor: pointer; color: #666; z-index: 10; background: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .modal-close:hover { color: #000; }
    .raw-text-box { max-height: 200px; overflow-y: auto; font-size: 11px; line-height: 1.4; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app"></div>

  <script>
    // Set PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ===== STATE =====
    const state = {
      files: [],
      view: 'upload',
      processing: false,
      currentFileIndex: -1,
      sortBy: 'societe',
      filterSociete: 'all',
      maSociete: localStorage.getItem('facturescan_masociete') || ''
    };

    // ===== INVOICE EXTRACTION (V3 - ROBUST) =====
    function parseInvoiceText(text, filename) {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const fullText = text;
      const upperText = text.toUpperCase();

      // Helper: validate a captured value is not a common French word
      function isValidInvoiceNumber(val) {
        if (!val || val.length < 2) return false;
        const badWords = /^(date|ation|uration|ture|ment|teur|pour|avec|dans|cette|votre|notre|avoir|total|montant|objet|paiement|reglement|euros?|prix|remise|solde|acompte|relev[eé]|r[eé]capitulatif|description|d[eé]signation|quantit[eé]|unit[eé]|libell[eé]|client|compte|adresse|code|type|mode|conditions?)$/i;
        if (badWords.test(val)) return false;
        // Must contain at least one digit
        if (!/\d/.test(val)) return false;
        return true;
      }

      // ========== SIRET ==========
      let siret = '';
      const siretPatterns = [
        /SIRET\s*[:\-]?\s*(\d[\d\s]{12,16}\d)/i,
        /SIRET\s*[:\-]?\s*(\d{14})/i,
        /SIRET\s*[:\-]?\s*(\d{3}\s?\d{3}\s?\d{3}\s?\d{5})/i,
      ];
      for (const p of siretPatterns) {
        const m = text.match(p);
        if (m) {
          const cleaned = m[1].replace(/\s/g, '');
          if (cleaned.length === 14) { siret = cleaned; break; }
        }
      }
      // Bare 14-digit only if near "SIRET" or "RCS" context (avoid false positives)
      if (!siret) {
        const bareMatch = text.match(/(\d{3}\s\d{3}\s\d{3}\s\d{5})/);
        if (bareMatch) {
          const idx = text.indexOf(bareMatch[0]);
          const context = text.substring(Math.max(0, idx - 80), idx + bareMatch[0].length + 20).toUpperCase();
          if (context.includes('SIRET') || context.includes('RCS') || context.includes('SIREN')) {
            siret = bareMatch[1].replace(/\s/g, '');
          }
        }
      }

      // ========== SIREN ==========
      let siren = siret ? siret.substring(0, 9) : '';
      if (!siren) {
        const sirenMatch = text.match(/SIREN\s*[:\-]?\s*(\d[\d\s]{7,10}\d)/i);
        if (sirenMatch) siren = sirenMatch[1].replace(/\s/g, '');
      }

      // ========== TVA Intracommunautaire ==========
      let tvaIntra = '';
      const tvaIntraPatterns = [
        /(?:TVA\s*(?:intra(?:communautaire)?|n[°o])|N[°o]\s*(?:de\s*)?TVA|Ident(?:ifiant)?\s*(?:de\s*)?TVA|ID\s*TVA|TVA\s*ID)\s*[:\-]?\s*(FR\s?\d{2}\s?\d{3}\s?\d{3}\s?\d{3})/i,
        /(FR\s?\d{2}\s?\d{3}\s?\d{3}\s?\d{3})/,
      ];
      for (const p of tvaIntraPatterns) {
        const m = text.match(p);
        if (m) { tvaIntra = m[1].replace(/\s/g, ''); break; }
      }

      // ========== ADDRESS ==========
      let adresse = '';
      const addrPatterns = [
        /(\d{1,4}[\s,]+(?:rue|avenue|av\.|boulevard|blvd|bd|impasse|chemin|place|allée|all\.|route|passage|cours|voie|quai|square|résidence|lot|zone)[^,\n]{3,60})/i,
        /(\d{1,4}[\s,]+(?:r\.|av\.|bd\.|imp\.|ch\.|pl\.|rte\.)[^,\n]{3,60})/i,
      ];
      for (const p of addrPatterns) {
        const m = text.match(p);
        if (m) {
          adresse = m[1].trim();
          const addrIdx = text.indexOf(m[0]);
          const afterAddr = text.substring(addrIdx + m[0].length, addrIdx + m[0].length + 100);
          const postalMatch = afterAddr.match(/\s*[,\-\n]?\s*(\d{5})\s+([A-ZÀ-Ü][a-zA-ZÀ-ü\s\-]+)/);
          if (postalMatch) {
            adresse += ', ' + postalMatch[1] + ' ' + postalMatch[2].trim();
          }
          break;
        }
      }
      if (!adresse) {
        const postalLine = text.match(/(\d{5})\s+([A-ZÀ-Ü][A-ZÀ-Üa-zà-ü\s\-]{2,30})/);
        if (postalLine) adresse = postalLine[0].trim();
      }

      // ========== SOCIETE / FOURNISSEUR (V3) ==========
      let societe = '';
      // Words that should NEVER be a societe name
      const badSocieteWords = /^(facture|invoice|devis|avoir|date|page|total|montant|paiement|reglement|objet|description|designation|conditions?|euros?|eur|prix|net|ttc|ht|tva|solde|acompte|releve|recap|client|adresse|code|iban|bic|rib|siret|siren|ape|naf|mode|type|remise)\s*$/i;
      const badSocieteContains = /\b(euro|EUR|€)\b/;

      // User's own company name (to exclude from supplier detection)
      const maSociete = (state.maSociete || '').trim().toUpperCase();
      function isMyCompany(name) {
        if (!maSociete || !name) return false;
        const upper = name.trim().toUpperCase();
        // Exact match or contains
        return upper === maSociete || upper.includes(maSociete) || maSociete.includes(upper);
      }

      // Detect client block - lines after "Client:", "Destinataire:", "Facturer a:", etc.
      const clientBlockStart = lines.findIndex(l => /^(client|destinataire|factur[eé]\s*[aà]|adress[eé]\s*[aà]|livr[eé]\s*[aà]|acheteur)\s*[:\-]?\s*$/i.test(l));
      const clientNames = new Set();
      if (clientBlockStart >= 0) {
        // Grab the next 3 lines as potential client names
        for (let i = clientBlockStart + 1; i < Math.min(clientBlockStart + 4, lines.length); i++) {
          if (lines[i].length >= 2 && lines[i].length <= 60 && !lines[i].match(/\d{1,4}\s*(rue|avenue)/i) && !lines[i].match(/\b\d{5}\b/)) {
            clientNames.add(lines[i].toUpperCase());
          }
        }
      }

      // Strategy 1: Look for explicit labels
      const explicitLabels = [
        /(?:Raison\s*sociale|Soci[eé]t[eé]|Fournisseur|Emetteur|Vendeur|Prestataire)\s*[:\-]?\s*(.{3,60})/i,
      ];
      for (const p of explicitLabels) {
        const m = text.match(p);
        if (m) {
          let val = m[1].trim().split('\n')[0].trim();
          val = val.replace(/\s*\d{1,4}\s*(rue|avenue|av\.|boulevard|blvd)\b.*/i, '');
          val = val.replace(/\s*\S+@\S+.*/g, '');
          val = val.replace(/\s*\+?\d[\d\s\.\-]{7,}.*$/, '');
          val = val.replace(/\b\d{5}\b.*$/, '');
          val = val.trim();
          if (val.length >= 2 && val.length <= 60 && !badSocieteWords.test(val) && !badSocieteContains.test(val) && !isMyCompany(val) && !clientNames.has(val.toUpperCase())) {
            societe = val;
            break;
          }
        }
      }

      // Strategy 2: Legal form patterns (SAS, SARL, etc.) - but NOT "EI" alone (too many false positives)
      if (!societe) {
        const legalPatterns = [
          /\b((?:[A-ZÀ-Ü][A-ZÀ-Üa-zà-ü\s&\'\-]{1,40})\s+(?:SARL|SAS|SA|EURL|SCI|SASU|SELARL|SELAS|SCOP|GIE))\b/,
          /\b((?:SARL|SAS|SA|EURL|SCI|SASU|SELARL|SELAS|SCOP|GIE)\s+(?:[A-ZÀ-Ü][A-ZÀ-Üa-zà-ü\s&\'\-]{1,40}))\b/,
          /\b((?:SARL|SAS|SA|EURL|SCI|SASU)\s+[^\n,;]{2,40})/i,
          /\b([^\n,;]{2,40}\s+(?:SARL|SAS|SA|EURL|SCI|SASU))\b/i,
        ];
        for (const p of legalPatterns) {
          const m = text.match(p);
          if (m) {
            let val = m[1].trim();
            val = val.replace(/\s*\S+@\S+.*/g, '');
            val = val.replace(/\b\d{5}\b.*$/, '');
            val = val.trim();
            if (val.length >= 3 && val.length <= 60 && !badSocieteContains.test(val) && !isMyCompany(val) && !clientNames.has(val.toUpperCase())) {
              societe = val;
              break;
            }
          }
        }
      }

      // Strategy 3: Use the text BEFORE the address
      if (!societe && adresse) {
        let addrLineIdx = -1;
        for (let i = 0; i < Math.min(lines.length, 15); i++) {
          if (lines[i].match(/\d{1,4}\s*(rue|avenue|av\.|boulevard|blvd|bd|impasse|chemin|place|allée|route|passage|cours)/i) ||
              lines[i].match(/\b\d{5}\b\s+[A-Z]/)) {
            addrLineIdx = i;
            break;
          }
        }
        if (addrLineIdx > 0) {
          for (let i = addrLineIdx - 1; i >= 0; i--) {
            const line = lines[i];
            if (line.length >= 2 && line.length <= 60 &&
                !line.match(/facture|invoice|devis|avoir|page|n[°o]\s/i) &&
                !badSocieteWords.test(line) && !badSocieteContains.test(line) &&
                !line.match(/@|www\.|http|tel[:\s]|fax|\+\d/i) &&
                !line.match(/^\d+[\s\/\-]\d+[\s\/\-]\d+/) &&
                !line.match(/^(euro|EUR|\d+[,\.]\d{2})/i) &&
                !line.match(/siret|siren|tva\s*[:\s]|iban|bic|rib|code\s*ape/i) &&
                !line.match(/^\d{5}\s/) &&
                !isMyCompany(line) && !clientNames.has(line.toUpperCase())) {
              societe = line;
              break;
            }
          }
        }
      }

      // Strategy 4: First prominent line (fallback)
      if (!societe) {
        for (let i = 0; i < Math.min(lines.length, 8); i++) {
          const line = lines[i];
          if (line.length >= 2 && line.length <= 55 &&
              !line.match(/facture|invoice|devis|avoir|date|page/i) &&
              !badSocieteWords.test(line) && !badSocieteContains.test(line) &&
              !line.match(/@|www\.|http|tel[:\s]|fax|\+\d/i) &&
              !line.match(/^\d+[\s\/\-]\d+/) &&
              !line.match(/^\d+\s*(rue|avenue|av\.|boulevard|blvd|bd|impasse|chemin|place|allée|route|passage|cours)/i) &&
              !line.match(/\b\d{5}\b/) &&
              !line.match(/^(euro|EUR|\d+[,\.]\d{2})/i) &&
              !line.match(/^\+?\d[\d\s\.\-]{7,}$/) &&
              !line.match(/^(le |du |en date)/i) &&
              !line.match(/siret|siren|tva\s*[:\s]|iban|bic|rib|code\s*ape/i) &&
              !line.match(/^[A-Z]{2}\d{2}\s/) &&
              !line.match(/^(montant|total|net|solde|reste)/i) &&
              !isMyCompany(line) && !clientNames.has(line.toUpperCase())) {
            societe = line;
            break;
          }
        }
      }

      // Final societe cleanup
      if (societe) {
        societe = societe.replace(/\s*\S+@\S+/g, '');
        societe = societe.replace(/\d+\s*(rue|avenue|av\.|boulevard|blvd|impasse|chemin|place|allée|route)\b.*/i, '');
        societe = societe.replace(/\b\d{5}\b.*$/, '');
        societe = societe.replace(/^\d+\s*/, '').replace(/[,;].*$/, '').trim();
        societe = societe.replace(/^\s*[-–—]\s*/, '');
        // Remove trailing "Euros", "EUR", monetary terms
        societe = societe.replace(/\s+(euros?|eur|€)\s*$/i, '').trim();
        if (societe.length > 50) societe = societe.substring(0, 50);
      }
      if (!societe || societe.length < 2) societe = 'Non identifie';

      // ========== NUMERO DE FACTURE (V3 - much stricter) ==========
      let numero = '';
      const numPatterns = [
        // "Facture N° XXX" or "Facture : XXX" - require word boundary after "facture"
        /\bfacture\b\s*(?:n[°o]?\s*)?[:\-#]?\s*([A-Z0-9][\w\-\/]{2,20})/i,
        // "N° XXX" or "Numero de facture XXX"
        /\b(?:n[°o]|num[eé]ro)\s*(?:de\s*)?(?:facture|fact\.?)?\s*[:\-#]?\s*([A-Z0-9][\w\-\/]{2,20})/i,
        // "Invoice XXX"
        /\binvoice\b\s*(?:n[°o]?\s*)?[:\-#]?\s*([A-Z0-9][\w\-\/]{2,20})/i,
        // "Ref: XXX"
        /\b(?:ref|r[eé]f[eé]rence)\s*[:\-#]?\s*([A-Z0-9][\w\-\/]{2,20})/i,
        // Common French invoice number formats: FA-2024-001, F2024001, etc.
        /\b(F[A-Z]?[\-\/]\d{4,}[\w\-]*)\b/,
        /\b(FA\d{4,})\b/,
        /\b(FACT[\-\/]?\d{3,})\b/i,
      ];
      for (const p of numPatterns) {
        const m = text.match(p);
        if (m && m[1]) {
          const val = m[1].trim();
          if (isValidInvoiceNumber(val)) {
            numero = val;
            break;
          }
        }
      }

      // ========== DATE FACTURE ==========
      let dateFacture = '';
      const moisFR = 'janvier|f[eé]vrier|mars|avril|mai|juin|juillet|ao[uû]t|septembre|octobre|novembre|d[eé]cembre';
      const datePatterns = [
        // "Date de facture: 01/01/2024"
        new RegExp('(?:date\\s*(?:de\\s*)?(?:facture|facturation|[eé]mission)?)\\s*[:\\-]?\\s*(\\d{1,2}[\\s\\/\\.\\-]\\d{1,2}[\\s\\/\\.\\-]\\d{2,4})', 'i'),
        // "le 01/01/2024", "du 01/01/2024"
        new RegExp('(?:le|du|en\\s*date\\s*du|fait\\s*le|[eé]mise?\\s*le)\\s+(\\d{1,2}[\\s\\/\\.\\-]\\d{1,2}[\\s\\/\\.\\-]\\d{2,4})', 'i'),
        // "Date: 1 janvier 2024"
        new RegExp('(?:date\\s*[:\\-]?\\s*)(\\d{1,2}\\s+(?:' + moisFR + ')\\s+\\d{4})', 'i'),
        // "01/01/2024" (standalone date with 4-digit year)
        /(\d{1,2}[\s\/\.\-]\d{1,2}[\s\/\.\-]\d{4})/,
        // "1 janvier 2024"
        new RegExp('(\\d{1,2}\\s+(?:' + moisFR + ')\\s+\\d{4})', 'i'),
      ];
      for (const p of datePatterns) {
        const m = text.match(p);
        if (m) { dateFacture = m[1]?.trim(); break; }
      }

      // ========== DATE ECHEANCE ==========
      let dateEcheance = '';
      const echPatterns = [
        /(?:[eé]ch[eé]ance|date\s*(?:de\s*)?(?:paiement|r[eè]glement|[eé]ch[eé]ance)|[aà]\s*payer\s*(?:avant|le))\s*[:\-]?\s*(\d{1,2}[\s\/\.\-]\d{1,2}[\s\/\.\-]\d{2,4})/i,
        /(?:payable|paiement)\s*[:\-]?\s*(?:avant\s*le\s*)?(\d{1,2}[\s\/\.\-]\d{1,2}[\s\/\.\-]\d{2,4})/i,
      ];
      for (const p of echPatterns) {
        const m = text.match(p);
        if (m) { dateEcheance = m[1]?.trim(); break; }
      }

      // ========== MONTANTS (V3 - more flexible) ==========
      let montantTTC = '';
      let montantHT = '';
      let tva = '';

      // Helper to extract amount value - handles "1 234,56" and "1234.56" and "1234,56 €"
      function extractAmount(match) {
        if (!match) return '';
        return match.trim().replace(/\s/g, '');
      }
      // Amount pattern fragment: matches "1 234,56" or "1234.56" or "250,00"
      const amtFrag = '([\\d\\s]+[,\\.]\\d{2})';

      // TTC patterns (most specific first)
      const ttcPatterns = [
        new RegExp('(?:total\\s*(?:ttc|toutes\\s*taxes)|net\\s*[aà]\\s*payer|montant\\s*(?:total\\s*)?ttc|solde\\s*[aà]\\s*payer)\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:€|EUR)?', 'i'),
        new RegExp('(?:net\\s*[aà]\\s*payer|total\\s*d[uû]|reste\\s*[aà]\\s*payer)\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:€|EUR)?', 'i'),
        new RegExp('\\bTTC\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:€|EUR)?', 'i'),
        new RegExp(amtFrag + '\\s*(?:€|EUR)\\s*TTC', 'i'),
        // "TOTAL : 250,00 €" without HT/TTC label - often means TTC
        new RegExp('\\btotal\\b\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:€|EUR)', 'i'),
      ];
      for (const p of ttcPatterns) {
        const m = text.match(p);
        if (m) { montantTTC = extractAmount(m[1]); break; }
      }

      // HT patterns
      const htPatterns = [
        new RegExp('(?:total\\s*(?:ht|hors\\s*taxes?)|montant\\s*(?:total\\s*)?ht|base\\s*ht)\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:€|EUR)?', 'i'),
        new RegExp('\\bHT\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:€|EUR)?', 'i'),
        new RegExp(amtFrag + '\\s*(?:€|EUR)\\s*HT', 'i'),
        new RegExp(amtFrag + '\\s*(?:€|EUR)?\\s*(?:hors\\s*taxes?)', 'i'),
      ];
      for (const p of htPatterns) {
        const m = text.match(p);
        if (m) { montantHT = extractAmount(m[1]); break; }
      }

      // TVA montant patterns
      const tvaPatterns = [
        new RegExp('(?:montant\\s*(?:de\\s*la\\s*)?tva|total\\s*tva)\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:€|EUR)?', 'i'),
        // "TVA 20% : 500,00" - capture the amount after the percentage
        new RegExp('\\b(?:tva|t\\.v\\.a\\.?)\\s*(?:\\d{1,2}[,\\.]?\\d{0,2}\\s*%)?\\s*[:\\-]?\\s*' + amtFrag + '\\s*(?:€|EUR)?', 'i'),
      ];
      for (const p of tvaPatterns) {
        const m = text.match(p);
        if (m) {
          const val = extractAmount(m[1]);
          // Avoid capturing TVA intra number as amount
          if (val && !val.match(/^FR/i) && val.length <= 12) {
            tva = val;
            break;
          }
        }
      }

      // Compute missing values from the others
      if (!montantTTC && montantHT && tva) {
        const ht = parseFloat(montantHT.replace(',', '.'));
        const tvaVal = parseFloat(tva.replace(',', '.'));
        if (!isNaN(ht) && !isNaN(tvaVal)) {
          montantTTC = (ht + tvaVal).toFixed(2).replace('.', ',');
        }
      }
      if (!montantHT && montantTTC && tva) {
        const ttc = parseFloat(montantTTC.replace(',', '.'));
        const tvaVal = parseFloat(tva.replace(',', '.'));
        if (!isNaN(ttc) && !isNaN(tvaVal)) {
          montantHT = (ttc - tvaVal).toFixed(2).replace('.', ',');
        }
      }
      if (!tva && montantTTC && montantHT) {
        const ttc = parseFloat(montantTTC.replace(',', '.'));
        const ht = parseFloat(montantHT.replace(',', '.'));
        if (!isNaN(ttc) && !isNaN(ht) && ttc > ht) {
          tva = (ttc - ht).toFixed(2).replace('.', ',');
        }
      }

      // Last resort for TTC: find largest amount in the document
      if (!montantTTC) {
        const amounts = [];
        const amtRegex = /([\d\s]{1,10}[,\.]\d{2})\s*(?:€|EUR)?/g;
        let match;
        while ((match = amtRegex.exec(text)) !== null) {
          const val = parseFloat(match[1].replace(/\s/g, '').replace(',', '.'));
          if (!isNaN(val) && val > 0 && val < 1000000) amounts.push(val);
        }
        if (amounts.length > 0) {
          montantTTC = Math.max(...amounts).toFixed(2).replace('.', ',');
        }
      }

      // Format amounts for display (add space as thousands separator)
      function formatAmount(val) {
        if (!val || val === '-') return '-';
        const num = parseFloat(val.replace(',', '.'));
        if (isNaN(num)) return val;
        return num.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      return {
        societe: societe || 'Non identifie',
        numero: numero || '-',
        dateFacture: dateFacture || '-',
        dateEcheance: dateEcheance || '-',
        montantHT: formatAmount(montantHT) || '-',
        montantTTC: formatAmount(montantTTC) || '-',
        tva: formatAmount(tva) || '-',
        siret: siret || '-',
        tvaIntra: tvaIntra || '-',
        adresse: adresse || '-',
        fichier: filename,
        confidence: (societe !== 'Non identifie' ? 1 : 0) + (montantTTC && montantTTC !== '-' ? 1 : 0) + (dateFacture && dateFacture !== '-' ? 1 : 0) + (numero && numero !== '-' ? 1 : 0) + (siret ? 1 : 0)
      };
    }

    // ===== PDF TEXT EXTRACTION (improved: preserve line structure) =====
    async function extractTextFromPDF(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        // Group items by Y position to preserve line breaks
        const items = content.items;
        if (items.length === 0) continue;
        let lastY = null;
        let lineText = '';
        for (const item of items) {
          const y = Math.round(item.transform[5]);
          if (lastY !== null && Math.abs(y - lastY) > 3) {
            fullText += lineText.trim() + '\n';
            lineText = '';
          }
          lineText += item.str + ' ';
          lastY = y;
        }
        if (lineText.trim()) fullText += lineText.trim() + '\n';
        fullText += '\n';
      }
      return fullText;
    }

    // ===== IMAGE OCR =====
    async function extractTextFromImage(file, onProgress) {
      const result = await Tesseract.recognize(file, 'fra+eng', {
        logger: m => { if (m.status === 'recognizing text' && onProgress) onProgress(m.progress); }
      });
      return result.data.text;
    }

    // ===== GENERATE THUMBNAIL =====
    async function generateThumbnail(file) {
      if (file.type === 'application/pdf') {
        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const page = await pdf.getPage(1);
          const viewport = page.getViewport({ scale: 0.4 });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          return canvas.toDataURL('image/jpeg', 0.7);
        } catch(e) { return null; }
      } else {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(file);
        });
      }
    }

    // ===== GENERATE FULL PREVIEW =====
    async function generateFullPreview(file) {
      if (file.type === 'application/pdf') {
        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const page = await pdf.getPage(1);
          const viewport = page.getViewport({ scale: 1.5 });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          return canvas.toDataURL('image/jpeg', 0.9);
        } catch(e) { return null; }
      } else {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(file);
        });
      }
    }

    // ===== PROCESS ALL FILES =====
    async function processFiles() {
      state.processing = true;
      render();

      for (let i = 0; i < state.files.length; i++) {
        const f = state.files[i];
        if (f.status === 'done') continue;

        state.currentFileIndex = i;
        f.status = 'processing';
        f.progress = 0;
        render();

        try {
          let text = '';
          if (f.type === 'application/pdf') {
            f.progress = 5;
            render();
            f.thumbnail = await generateThumbnail(f.file);
            f.progress = 10;
            render();
            text = await extractTextFromPDF(f.file);
            f.progress = 70;
            render();
            // If PDF text is too short (scanned PDF), try OCR
            if (text.replace(/\s/g, '').length < 50) {
              f.progress = 75;
              render();
              // Convert PDF page to image for OCR
              try {
                const arrayBuffer = await f.file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;
                const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                text = await extractTextFromImage(blob, (p) => {
                  f.progress = 75 + Math.round(p * 20);
                  render();
                });
              } catch(ocrErr) {
                console.warn('OCR fallback failed for', f.name, ocrErr);
              }
            }
            f.progress = 95;
            render();
          } else {
            f.thumbnail = await generateThumbnail(f.file);
            text = await extractTextFromImage(f.file, (p) => {
              f.progress = Math.round(p * 90);
              render();
            });
          }

          f.extractedText = text;
          f.invoiceData = parseInvoiceText(text, f.name);
          f.status = 'done';
          f.progress = 100;
        } catch (err) {
          console.error('Error processing', f.name, err);
          f.status = 'error';
          f.errorMessage = err.message;
        }
        render();
      }

      state.processing = false;
      state.view = 'results';
      render();
    }

    // ===== EXPORT EXCEL =====
    function exportToExcel() {
      const invoices = state.files
        .filter(f => f.status === 'done' && f.invoiceData)
        .map(f => f.invoiceData);

      invoices.sort((a, b) => a.societe.localeCompare(b.societe, 'fr'));

      const wsData = [
        ['Fournisseur', 'Adresse', 'SIRET', 'TVA Intracom.', 'N° Facture', 'Date Facture', 'Echeance', 'Montant HT', 'TVA', 'Montant TTC', 'Fichier source']
      ];

      let currentSociete = '';
      for (const inv of invoices) {
        if (inv.societe !== currentSociete) {
          if (currentSociete) wsData.push([]);
          currentSociete = inv.societe;
        }
        wsData.push([
          inv.societe, inv.adresse, inv.siret, inv.tvaIntra,
          inv.numero, inv.dateFacture, inv.dateEcheance,
          inv.montantHT, inv.tva, inv.montantTTC, inv.fichier
        ]);
      }

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols'] = [
        { wch: 30 }, { wch: 40 }, { wch: 18 }, { wch: 18 },
        { wch: 18 }, { wch: 14 }, { wch: 14 },
        { wch: 14 }, { wch: 12 }, { wch: 14 }, { wch: 35 }
      ];

      XLSX.utils.book_append_sheet(wb, ws, 'Factures');
      XLSX.writeFile(wb, `factures_scan_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

                  <th class="py-3 px-2 text-left text-xs font-semibold text-gray-500 uppercase cursor-pointer hover:text-indigo-600" data-sort="date">Date</th>
                  <th class="py-3 px-2 text-left text-xs font-semibold text-gray-500 uppercase">Adresse</th>
                  <th class="py-3 px-2 text-left text-xs font-semibold text-gray-500 uppercase">SIRET</th>
                  <th class="py-3 px-2 text-right text-xs font-semibold text-gray-500 uppercase">HT</th>
                  <th class="py-3 px-2 text-right text-xs font-semibold text-gray-500 uppercase">TVA</th>
                  <th class="py-3 px-2 text-right text-xs font-semibold text-gray-500 uppercase cursor-pointer hover:text-indigo-600" data-sort="montant">TTC</th>
                </tr>
              </thead>
              <tbody>
                ${tableRows || '<tr><td colspan="8" class="py-8 text-center text-gray-400">Aucune facture trouvee</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    // ===== EVENT HANDLERS =====
    function attachEvents() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const startBtn = document.getElementById('startBtn');
      const clearBtn = document.getElementById('clearBtn');
      const exportBtn = document.getElementById('exportBtn');
      const backBtn = document.getElementById('backBtn');
      const clearFilter = document.getElementById('clearFilter');

      if (dropZone) {
        dropZone.addEventListener('click', () => fileInput?.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
          e.preventDefault();
          dropZone.classList.remove('dragover');
          handleFiles(e.dataTransfer.files);
        });
      }

      if (fileInput) {
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
      }

      const maSocieteInput = document.getElementById('maSocieteInput');
      if (maSocieteInput) {
        maSocieteInput.addEventListener('input', (e) => {
          state.maSociete = e.target.value;
          localStorage.setItem('facturescan_masociete', e.target.value);
        });
      }

      if (startBtn) startBtn.addEventListener('click', processFiles);
      if (clearBtn) clearBtn.addEventListener('click', () => { state.files = []; render(); });
      if (exportBtn) exportBtn.addEventListener('click', exportToExcel);
      if (backBtn) backBtn.addEventListener('click', () => { state.view = 'upload'; render(); });
      if (clearFilter) clearFilter.addEventListener('click', () => { state.filterSociete = 'all'; render(); });

      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.remove);
          state.files.splice(idx, 1);
          render();
        });
      });

      document.querySelectorAll('[data-filter-societe]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const s = e.currentTarget.dataset.filterSociete;
          state.filterSociete = state.filterSociete === s ? 'all' : s;
          render();
        });
      });

      document.querySelectorAll('[data-sort]').forEach(th => {
        th.addEventListener('click', (e) => {
          state.sortBy = e.target.dataset.sort;
          render();
        });
      });
    }

    function handleFiles(fileList) {
      const accepted = ['application/pdf', 'image/jpeg', 'image/png', 'image/webp', 'image/tiff', 'image/bmp'];
      for (const file of fileList) {
        if (!accepted.includes(file.type)) continue;
        if (state.files.some(f => f.name === file.name && f.size === file.size)) continue;
        state.files.push({
          id: Math.random().toString(36).substr(2, 9),
          name: file.name,
          size: file.size,
          type: file.type,
          status: 'pending',
          progress: 0,
          extractedText: '',
          invoiceData: null,
          file: file,
          thumbnail: null,
          fullPreview: null
        });
      }
      render();
    }

    // ===== INIT =====
    render();
  </script>
</body>
</html>
